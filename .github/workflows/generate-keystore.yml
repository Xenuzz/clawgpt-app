name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass keystorepassword -keypass keypassword -dname "CN=ClawGPT, OU=Mobile, O=ClawGPT, L=Berlin, ST=Berlin, C=DE"
          base64 -w 0 keystore.jks > keystore.b64
          cat keystore.b64

      - name: Show Secrets
        run: |
          echo "KEYSTORE_BASE64 Secret:"
          cat keystore.b64
          echo ""
          echo "Use these values for GitHub Secrets:"
          echo "KEYSTORE_PASSWORD=keystorepassword"
          echo "KEY_ALIAS=upload"
          echo "KEY_PASSWORD=keypassword"
